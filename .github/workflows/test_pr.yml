name: Manual PR Build

on:
  workflow_dispatch:
    inputs:
      pr:
        description: 'PR number to test'
        required: true

jobs:
  run-on-pr-head:
    permissions:
      pull-requests: read
      actions: read
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
            platform: linux
          - name: windows
            os: windows-latest
            platform: windows
          - name: macos-x64
            os: macos-15-intel
            platform: macos
            arch: x64
          - name: macos-arm64
            os: macos-15
            platform: macos
            arch: arm64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch PR head
        run: |
          git fetch origin +refs/pull/${{ inputs.pr }}/head:refs/remotes/origin/pr/${{ inputs.pr }}
          git checkout -qf refs/remotes/origin/pr/${{ inputs.pr }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0

      - name: Install Linux Build Dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y icnsutils graphicsmagick xz-utils libx11-dev libxkbfile-dev gnome-keyring libsecret-1-dev libfontconfig-dev rpm

      - name: Install Dependencies
        run: npm ci --no-audit --no-fund --ignore-scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Workaround: Fix native build failure due to outdated node-gyp version on Windows
      - name: Fix node-gyp (Windows)
        if: matrix.platform == 'windows'
        run: |
          npm install --global node-gyp@latest
          npm config set node_gyp "$env:APPDATA\npm\node_modules\node-gyp\bin\node-gyp.js"
          node-gyp install
        shell: pwsh

      # Workaround: Disable Spectre mitigation in native-keymap (VS Spectre component not available on CI)
      - name: Patch native-keymap binding.gyp (Windows)
        if: matrix.platform == 'windows'
        run: |
          node -e "const fs=require('fs'),p='node_modules/native-keymap/binding.gyp';let c=fs.readFileSync(p,'utf8');c=c.replace(\"'SpectreMitigation': 'Spectre'\",\"'SpectreMitigation': 'Disabled'\");fs.writeFileSync(p,c,'utf8');console.log('Patched SpectreMitigation -> Disabled')"
        shell: bash

      # Electron seems to require C++20 support for native modules now after Electron 33
      - name: Set C++20 for MacOS
        if: matrix.platform == 'macos'
        run: |
          echo "CXXFLAGS=-std=gnu++20 -stdlib=libc++" >> $GITHUB_ENV

      - name: Rebuild native modules for Electron (MacOS + Windows)
        if: matrix.platform != 'linux'
        run: npx @electron/rebuild -f
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GYP_MSVS_VERSION: 2022

      - name: Rebuild native modules for Electron (Ubuntu)
        if: matrix.platform == 'linux'
        run: USE_ELECTRON_CLANG=0 npx @electron/rebuild -f
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: build-linux
        if: matrix.platform == 'linux'
        run: npm run build:linux

      - name: build-mac
        if: matrix.platform == 'macos'
        run: npm run build:mac -- --${{ matrix.arch }}

      - name: build-win
        if: matrix.platform == 'windows'
        run: npm run build:win

      # Adjust the path to your build outputs per OS
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jsmarknote-${{ matrix.name }}
          # Replace with your actual dist paths or globs
          path: |
            dist/**
          if-no-files-found: error

  comment-on-pr:
    name: Comment artifact links on PR
    needs: run-on-pr-head
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      actions: read
    steps:
      - name: Build comment body from artifacts
        id: build
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const run_id = context.runId;
            // List all artifacts for this workflow run
            const { data } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id,
              per_page: 100
            });

            if (!data.artifacts.length) {
              core.setOutput('body', 'No artifacts were uploaded.');
            } else {
              const rows = data.artifacts.map(a => {
                const artifactPage = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${run_id}/artifacts/${a.id}`;
                return `| ${a.name} | ${a.size_in_bytes} bytes | [Download](${artifactPage}) |`;
              }).join('\n');

              const body = [
                `Build artifacts for PR #${{ inputs.pr }}:`,
                '',
                `Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${run_id}`,
                '',
                '| Artifact | Size | Link |',
                '|---|---:|---|',
                rows
              ].join('\n');

              core.setOutput('body', body);
            }

      # Create or update a sticky comment so you do not spam the PR
      - name: Post or update PR comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ inputs.pr }}
          body: ${{ steps.build.outputs.body }}
          edit-mode: replace
          comment-tag: artifact-links
