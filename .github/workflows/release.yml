name: Build/release JsMarkNote

on:
  push:
    tags:
      - v*.*.*

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - name: linux
            os: ubuntu-22.04
            platform: linux
          - name: windows
            os: windows-2022
            platform: windows
          - name: macos-x64
            os: macos-15-intel
            platform: macos
            arch: x64
          - name: macos-arm64
            os: macos-15
            platform: macos
            arch: arm64

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0

      - name: Install Linux Build Dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y icnsutils graphicsmagick xz-utils libx11-dev libxkbfile-dev gnome-keyring libsecret-1-dev libfontconfig-dev rpm

        # --ignore-scripts first to prevent postinstall scripts from running (we will run electron-rebuild manually later)
        # --no-audit and --no-fund to reduce noise
      - name: Install Dependencies
        run: npm ci --no-audit --no-fund --ignore-scripts --loglevel verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Workaround: Fix native build failure due to outdated node-gyp version on Windows
      - name: Fix node-gyp (Windows)
        if: matrix.platform == 'windows'
        run: |
          npm install --global node-gyp@latest
          npm config set node_gyp "$env:APPDATA\npm\node_modules\node-gyp\bin\node-gyp.js"
          node-gyp install
        shell: pwsh

      # Patch native-keymap to disable Spectre mitigation (not available on CI)
      - name: Patch native-keymap binding.gyp (Windows)
        if: matrix.platform == 'windows'
        run: |
          Write-Host "=== Before patch ==="
          Select-String -Path "node_modules/native-keymap/binding.gyp" -Pattern "SpectreMitigation"
          node scripts/patch-native-keymap.js
          Write-Host "=== After patch ==="
          Select-String -Path "node_modules/native-keymap/binding.gyp" -Pattern "SpectreMitigation"
        shell: pwsh

      # Electron seems to require C++20 support for native modules now after Electron 33
      - name: Set C++20 for MacOS
        if: matrix.platform == 'macos'
        run: |
          echo "CXXFLAGS=-std=gnu++20 -stdlib=libc++" >> $GITHUB_ENV

      # Use Electron's bundled Clang on Windows to support GCC builtins like __builtin_frame_address
      - name: Rebuild native modules for Electron (Windows)
        if: matrix.platform == 'windows'
        run: |
          npm config set clang 1
          npx @electron/rebuild -f
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USE_ELECTRON_CLANG: 1

      - name: Rebuild native modules for Electron (MacOS)
        if: matrix.platform == 'macos'
        run: npx @electron/rebuild -f
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GYP_MSVS_VERSION: 2022

      # Enforce using gcc/g++ on Linux for electron-rebuild instead of clang (.npmrc covers some settings too)
      - name: Rebuild native modules for Electron (Ubuntu)
        if: matrix.platform == 'linux'
        run: USE_ELECTRON_CLANG=0 npx @electron/rebuild -f
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: build-linux
        if: matrix.platform == 'linux'
        run: npm run build:linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Mac builds have been disabled due to a lack of a Developer ID to sign it
      # All builds by default will give a "this app is damaged and can't be opened" error
      - name: build-mac
        if: matrix.platform == 'macos'
        run: npm run build:mac -- --${{ matrix.arch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: build-win
        if: matrix.platform == 'windows'
        run: npm run build:win
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          preRelease: true
          generate_release_notes: true
          name: 'Pre-release ${{ github.ref_name }}'
          body: |
            ## ❗This is a Pre-release
            - This is a pre-release build of JsMarkNote, it will most likely contain bugs and unfinished features.

            ## ⚠️ Note for MacOS Users
            - MacOS releases will show a "`Apple couldn't verify JsMarkNote is free of viruses...`" due to a **lack of notorisation**.
            - Please run the following commands after you have dragged JsMarkNote into the "Applications" folder
            ```
            sudo find /Applications/jsmarknote.app -exec xattr -c {} \; # <-- Note this change on newer MacOS versions
            sudo codesign --force --deep --sign - /Applications/jsmarknote.app
            ```

            ## Changes
          files: |
            dist/*.exe
            dist/*.zip
            dist/*.dmg
            dist/*.AppImage
            dist/*.snap
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
